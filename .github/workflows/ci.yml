name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Basic lint via compile gate script
        run: |
          python - <<'PY'
          import os, py_compile
          bad = []
          for root, _, files in os.walk('.'):
            if any(skip in root for skip in ['/.venv', '/.git', '/__pycache__', '/.pytest_cache']):
              continue
            for f in files:
              if not f.endswith('.py'):
                continue
              path = os.path.join(root, f)
              try:
                py_compile.compile(path, doraise=True)
              except Exception as exc:
                bad.append((path, str(exc)))
          if bad:
            raise SystemExit("compile errors: " + str(bad[:5]))
          print('compile lint ok')
          PY

  legacy-import-guard:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fail On Legacy Imports
        run: |
          python - <<'PY'
          import os
          import re

          blocked = [
              re.compile(r"^\s*from\s+quant_bot(?:\.|\s|$)"),
              re.compile(r"^\s*import\s+quant_bot(?:\.|\s|$)"),
              re.compile(r"^\s*from\s+modules(?:\.|\s|$)"),
              re.compile(r"^\s*import\s+modules(?:\.|\s|$)"),
              re.compile(r"^\s*from\s+execution(?:\.|\s|$)"),
              re.compile(r"^\s*import\s+execution(?:\.|\s|$)"),
              re.compile(r"^\s*from\s+portfolio(?:\.|\s|$)"),
              re.compile(r"^\s*import\s+portfolio(?:\.|\s|$)"),
              re.compile(r"^\s*from\s+strategies(?:\.|\s|$)"),
              re.compile(r"^\s*import\s+strategies(?:\.|\s|$)"),
              re.compile(r"^\s*from\s+strategy_marketplace(?:\.|\s|$)"),
              re.compile(r"^\s*import\s+strategy_marketplace(?:\.|\s|$)"),
          ]

          violations = []
          for root, _, files in os.walk('.'):
            if any(skip in root for skip in ['/.venv', '/.git', '/__pycache__', '/.pytest_cache']):
              continue
            for f in files:
              if not f.endswith('.py'):
                continue
              path = os.path.join(root, f)
              with open(path, 'r', encoding='utf-8') as handle:
                for lineno, line in enumerate(handle, start=1):
                  for rule in blocked:
                    if rule.search(line):
                      violations.append(f"{path}:{lineno}: {line.strip()}")
                      break

          if violations:
            raise SystemExit("legacy import violations:\n" + "\n".join(violations[:100]))
          print('legacy import guard ok')
          PY

  tests:
    runs-on: ubuntu-latest
    needs: legacy-import-guard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run pytest
        run: pytest -q aegis/tests tests/test_aegis_*.py tests/test_phase2_parity_scaffold.py

  parity-tests:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyyaml
      - name: Run parity tests
        run: pytest -q aegis/tests/parity

  ci-gate:
    runs-on: ubuntu-latest
    needs: [legacy-import-guard, tests, parity-tests]
    steps:
      - name: Final gate
        run: echo "all checks passed"
